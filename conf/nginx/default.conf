map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 443 ssl;
    server_name localhost;
    autoindex on;

    ssl_certificate /run/secrets/nginx.crt;
    ssl_certificate_key /run/secrets/nginx.key;



    location /ws/chatP {
        proxy_pass http://chatp_service:9002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws/chatG {
        proxy_pass http://chatg_service:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws/friend {
        proxy_pass http://user_service:9003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;

    }

    location /ws/morp {
        proxy_pass http://morpion:9004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /api/pong3d/ {
        proxy_pass http://gateway:9000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # location /app/media/ {
    #     # If your media is hosted in a specific container, proxy it there:
    #     proxy_pass http://front:80/media/; 
        
    #     # OR if Nginx is serving the files directly from a folder:
    #     # root /path/to/your/media/folder; 
    # }
    location /app/media/ {
    # Strip the '/app/media/' prefix and pass the rest to the front container's /media/ folder
    proxy_pass http://front:80/media/; 

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    
    # Add these to prevent the browser from getting confused by MIME types
    proxy_hide_header Content-Type;
    add_header Content-Type model/gltf-binary;
}


    location /api {
        proxy_pass http://gateway:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    location / {
        proxy_pass http://front:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


}
