services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    volumes:
      - ./conf/db/conf.cnf:/etc/mysql/conf.d/my.cnf
      - ./conf/db/conf.sh:/docker-entrypoint-initdb.d/conf.sh
    networks:
      - home
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/data_pswd
      MYSQL_DATABASE: TRANS
      MYSQL_USER: bobi
      MYSQL_PASSWORD: 123
    secrets:
      - data_pswd
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15

  myadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: myadmin
    depends_on:
      - mysql
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: bobi
      PMA_PASSWORD: 123
    networks:
      - home
    restart: always

  front:
    container_name: front
    build: ./web_dev/front/
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "5173:5173"
    volumes:
      - ./web_dev/front/:/app
      - /app/node_modules


  gateway:
    build: ./web_dev/back
    container_name: gateway
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9000:9000"
    volumes:
      - ./web_dev/back/:/app
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat
  
  auth:
    build: ./web_dev/back/auth
    container_name: auth
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9005:9005"
    volumes:
      - ./web_dev/back/auth:/app
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  chatp_service:
    build: ./web_dev/back/chat/chatP
    container_name: chatp_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9002:9002"
    volumes:
      - ./web_dev/back/chat/chatP:/app
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  chatg_service:
    build: ./web_dev/back/chat/chatG
    container_name: chatg_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9001:9001"
    volumes:
      - ./web_dev/back/chat/chatG:/app
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  user_service:
    build: ./web_dev/back/user
    container_name: user_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9003:9003"
    volumes:
      - ./web_dev/back/user:/app
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  pong3d:
    build: ./web_dev/back/pong3D
    container_name: pong3d
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "2567:2567"
    secrets:
      - cle_pswd
      - cle_chat
    volumes:
      - ./web_dev/back/pong3D:/app
      - ./web_dev/front/media:/app/src/media
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/routes:/app/src/routes
      - /app/node_modules
    cap_add:
      - NET_ADMIN

  morpion:
    build: ./web_dev/back/morpion
    container_name: morpion
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9004:9004"
    secrets:
      - cle_pswd
      - cle_chat
    volumes:
      - ./web_dev/back/morpion:/app
      - ./web_dev/back/src/routes:/app/src/routes
      - ./web_dev/back/src/models:/app/src/models
      - ./web_dev/back/src/morpion:/app/src/morpion
      - /app/node_modules

secrets:
  data_pswd:
    file: ./conf/secrets/data_pswd
  cle_chat:
    file: ./conf/secrets/cle_chat
  cle_pswd:
    file: ./conf/secrets/cle_pswd

networks:
  home:
    driver: bridge