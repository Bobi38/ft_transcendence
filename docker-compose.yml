  #     - cle_pswd
  #   volumes:
  #     - ./nweb/back/gameServer:/app/back/gameServer
  #     - /app/back/gameServer/node_modules
  #     - ./nweb/back/src/routes:/app/src/routes

  morp:
    build: ./nweb/back/game/morp
    container_name: morp
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9004:9004"
    secrets:
      - cle_pswd
      - cle_chat
    volumes:
      - ./nweb/back/game/morp:/app
      - ./nweb/back/src/routes:/app/src/routes
      - ./nweb/back/src/models:/app/src/models
      - ./nweb/back/src/morpion:/app/src/morpion
      - /app//node_modules

secrets:
  data_pswd:
    file: ./conf/secrets/data_pswd
  cle_chat:
    file: ./conf/secrets/cle_chat
  cle_pswd:
    file: ./conf/secrets/cle_pswd

networks:
  home:
    driver: bridge
