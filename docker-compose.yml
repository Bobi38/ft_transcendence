services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    volumes:
      - ./conf/db/conf.cnf:/etc/mysql/conf.d/my.cnf
      - ./conf/db/conf.sh:/docker-entrypoint-initdb.d/conf.sh
    networks:
      - home
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/data_pswd
      MYSQL_DATABASE: TRANS
      MYSQL_USER: bobi
      MYSQL_PASSWORD: 123
    secrets:
      - data_pswd
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15

  myadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: myadmin
    depends_on:
      - mysql
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: bobi
      PMA_PASSWORD: 123
    networks:
      - home
    restart: always

  front:
    container_name: front
    build: ./nweb/front/
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "5173:5173"
    volumes:
      - ./nweb/front/:/app
      - /app/node_modules


  gateway:
    build: ./nweb/back/
    container_name: gateway
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9000:9000"
    volumes:
      - ./nweb/back/:/app
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat
  
  auth:
    build: ./nweb/back/auth
    container_name: auth
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9005:9005"
    volumes:
      - ./nweb/back/auth:/app
      - ./nweb/back/src/models:/app/src/models
      - ./nweb/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  chatp_service:
    build: ./nweb/back/chat/chatP
    container_name: chatp_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9002:9002"
    volumes:
      - ./nweb/back/chat/chatP:/app
      - ./nweb/back/src/models:/app/src/models
      - ./nweb/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  chatg_service:
    build: ./nweb/back/chat/chatG
    container_name: chatg_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9001:9001"
    volumes:
      - ./nweb/back/chat/chatG:/app
      - ./nweb/back/src/models:/app/src/models
      - ./nweb/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  user_service:
    build: ./nweb/back/user
    container_name: user_service
    environment:
      DB_USER: "bobi"
      DB_PASSWORD: 123
      DB_NAME: "TRANS"
      DB_HOST: "mysql"
      DB_PORT:  3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - home
    ports:
      - "9003:9003"
    volumes:
      - ./nweb/back/user:/app
      - ./nweb/back/src/models:/app/src/models
      - ./nweb/back/src/routes:/app/src/routes
      - /app/node_modules
    secrets:
    - cle_pswd
    - cle_chat

  # ping:
  #   build: ./nweb/back/game
  #   container_name: ping
  #   environment:
  #     DB_USER: "bobi"
  #     DB_PASSWORD: 123
  #     DB_NAME: "TRANS"
  #     DB_HOST: "mysql"
  #     DB_PORT:  3306
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #   networks:
  #     - home
